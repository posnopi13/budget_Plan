name: Build Android APK

# main 브랜치 push 시 또는 수동 실행 시 트리거
on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      debug_enabled:
        description: 'Enable debug logging'
        required: false
        default: 'false'

jobs:
  build-android:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      # 1. 소스 코드 체크아웃
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Node.js 설정 (npm 캐시 포함)
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Java 17 설정 (Gradle 빌드에 필요)
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 4. Node 의존성 설치
      - name: Install Node.js dependencies
        run: npm install

      # 5. 웹 에셋 빌드 (index.html → dist/index.html 복사)
      - name: Build web assets
        run: npm run build

      # 6. Capacitor Android 플랫폼 추가 (android/ 디렉터리 생성)
      - name: Add Capacitor Android platform
        run: npx cap add android

      # 7. 빌드된 웹 에셋을 Android 프로젝트에 동기화
      - name: Sync Capacitor with Android
        run: npx cap sync android

      # 8. Gradle 캐시 설정 (두 번째 빌드부터 속도 대폭 향상)
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 9. gradlew 실행 권한 부여
      - name: Grant execute permission to gradlew
        run: chmod +x android/gradlew

      # 10. Android SDK 라이선스 동의
      - name: Accept Android SDK licenses
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || \
          yes | $ANDROID_HOME/tools/bin/sdkmanager --licenses 2>/dev/null || \
          echo "SDK license step skipped (already accepted)"

      # 11. Debug APK 빌드
      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2g -Dorg.gradle.daemon=false"

      # 12. APK 아티팩트 업로드 (7일간 보관)
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: budget-plan-debug-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
          if-no-files-found: error

      # 13. 빌드 성공 요약 출력
      - name: Build summary
        if: success()
        run: |
          echo "## APK Build Succeeded!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **App ID**: com.budgetplan.app" >> $GITHUB_STEP_SUMMARY
          echo "- **App Name**: BudgetPlan" >> $GITHUB_STEP_SUMMARY
          echo "- **Build number**: ${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Artifact name**: budget-plan-debug-${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Actions 탭 → 해당 워크플로우 실행 → Artifacts 섹션에서 APK 다운로드" >> $GITHUB_STEP_SUMMARY
