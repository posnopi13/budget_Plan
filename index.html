<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MoneyBook</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 16px 16px 30px;
    }
    h1 { color: #fff; margin-bottom: 14px; font-size: 20px; letter-spacing: 1px; }

    .screen-tabs {
      display: flex; gap: 8px; margin-bottom: 18px;
      width: 100%; max-width: 375px;
    }
    .screen-tab {
      flex: 1; padding: 10px 6px; border-radius: 20px; border: none;
      cursor: pointer; font-size: 13px; font-weight: 600;
      background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.6); transition: all 0.2s;
    }
    .screen-tab.active { background: #6C5CE7; color: #fff; }

    .phone {
      width: 100%; max-width: 375px; min-height: 680px;
      background: #F8F9FA; border-radius: 30px; overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      position: relative; display: flex; flex-direction: column;
    }
    .status-bar {
      background: #fff; padding: 12px 20px 8px;
      display: flex; justify-content: space-between;
      font-size: 12px; font-weight: 600; color: #2D3436; flex-shrink: 0;
    }
    .screen-content {
      flex: 1; overflow-y: auto; overflow-x: hidden;
      -webkit-overflow-scrolling: touch; padding-bottom: 30px;
    }
    .screen-content::-webkit-scrollbar { display: none; }
    .screen { display: none; }
    .screen.active { display: block; }

    .month-nav {
      background: #fff; display: flex; align-items: center; justify-content: center;
      padding: 14px 0; border-bottom: 1px solid #E9ECEF;
    }
    .arrow { font-size: 28px; color: #6C757D; padding: 0 24px; cursor: pointer; user-select: none; }
    .month-text { font-size: 18px; font-weight: 700; color: #2D3436; min-width: 120px; text-align: center; }

    .summary-card {
      margin: 14px; background: #fff; border-radius: 16px;
      padding: 18px; box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .summary-row { display: flex; margin-bottom: 14px; }
    .summary-item { flex: 1; text-align: center; }
    .summary-divider { width: 1px; background: #E9ECEF; }
    .summary-label { font-size: 13px; color: #6C757D; margin-bottom: 6px; }
    .summary-amount { font-size: 18px; font-weight: 800; }
    .balance-row {
      display: flex; justify-content: space-between; align-items: center;
      padding-top: 14px; border-top: 1px solid #E9ECEF;
    }
    .balance-label { font-size: 15px; color: #6C757D; font-weight: 600; }
    .balance-amount { font-size: 20px; font-weight: 800; }

    .section-title { font-size: 16px; font-weight: 700; color: #2D3436; margin: 0 14px 8px; }

    .transaction-item {
      display: flex; align-items: center; background: #fff; border-radius: 12px;
      padding: 14px; margin: 0 14px 8px; box-shadow: 0 1px 6px rgba(0,0,0,0.05);
    }
    .cat-icon {
      width: 44px; height: 44px; border-radius: 22px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; margin-right: 12px; flex-shrink: 0;
    }
    .t-info { flex: 1; min-width: 0; }
    .t-title { font-size: 15px; font-weight: 600; color: #2D3436; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .t-sub { font-size: 12px; color: #6C757D; }
    .t-amount { font-size: 16px; font-weight: 700; flex-shrink: 0; margin-left: 8px; }

    /* FAB - fixed relative to phone */
    .fab-wrapper {
      position: relative; width: 100%; max-width: 375px;
      height: 0; pointer-events: none;
    }
    .fab {
      position: absolute; bottom: 80px; right: 16px;
      width: 58px; height: 58px; border-radius: 29px;
      background: #6C5CE7;
      display: flex; align-items: center; justify-content: center;
      font-size: 30px; color: #fff; font-weight: 300;
      box-shadow: 0 6px 20px rgba(108,92,231,0.5);
      cursor: pointer; border: none; line-height: 1;
      pointer-events: auto; z-index: 50;
    }

    .empty-state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 50px 20px;
    }
    .empty-icon { font-size: 50px; margin-bottom: 14px; }
    .empty-text { font-size: 16px; color: #6C757D; font-weight: 600; margin-bottom: 6px; }
    .empty-sub { font-size: 13px; color: #ADB5BD; }

    .header {
      background: #fff; padding: 14px 0; text-align: center;
      font-size: 17px; font-weight: 700; color: #2D3436;
      border-bottom: 1px solid #E9ECEF; flex-shrink: 0;
    }

    /* Budget */
    .total-budget-card {
      margin: 14px; background: #6C5CE7; border-radius: 16px;
      padding: 20px; box-shadow: 0 6px 20px rgba(108,92,231,0.4); color: #fff;
    }
    .tb-title { font-size: 13px; color: rgba(255,255,255,0.8); font-weight: 600; margin-bottom: 4px; }
    .tb-amount { font-size: 28px; font-weight: 800; margin-bottom: 16px; }
    .tb-row { display: flex; margin-bottom: 14px; }
    .tb-item { flex: 1; }
    .tb-item-label { font-size: 12px; color: rgba(255,255,255,0.7); margin-bottom: 4px; }
    .tb-item-value { font-size: 16px; font-weight: 700; }
    .progress-bg { height: 8px; background: rgba(255,255,255,0.3); border-radius: 4px; overflow: hidden; margin-bottom: 6px; }
    .progress-bar { height: 8px; border-radius: 4px; }
    .progress-text { font-size: 11px; color: rgba(255,255,255,0.8); text-align: right; }

    .budget-card {
      background: #fff; border-radius: 12px; margin: 0 14px 10px; padding: 16px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.05);
    }
    .budget-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    .budget-left { display: flex; align-items: center; }
    .b-icon { width: 36px; height: 36px; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 18px; margin-right: 10px; }
    .b-name { font-size: 15px; font-weight: 600; color: #2D3436; }
    .b-amount-tag { background: #F1F3F5; border-radius: 8px; padding: 5px 10px; font-size: 13px; color: #6C757D; font-weight: 600; }
    .b-not-set { background: #F1F3F5; border-radius: 8px; padding: 5px 10px; font-size: 12px; color: #ADB5BD; }
    .spent-row { display: flex; justify-content: space-between; margin-bottom: 8px; margin-top: 4px; }
    .spent-label { font-size: 13px; color: #6C757D; }
    .remain-label { font-size: 13px; font-weight: 600; }
    .b-progress-bg { height: 8px; background: #F1F3F5; border-radius: 4px; overflow: hidden; }
    .b-progress-bar { height: 8px; border-radius: 4px; }
    .over-budget-text { font-size: 12px; color: #FF6B6B; font-weight: 600; margin-top: 6px; text-align: right; }

    .budget-fab-wrap { padding: 14px 14px 8px; }
    .budget-fab {
      width: 100%; padding: 14px; border-radius: 14px; border: none;
      background: #6C5CE7; color: #fff; font-size: 15px; font-weight: 700;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
      box-shadow: 0 4px 14px rgba(108,92,231,0.4);
    }

    /* Stats */
    .stats-summary { display: flex; padding: 14px; gap: 12px; }
    .stat-card { flex: 1; background: #fff; border-radius: 12px; padding: 16px; box-shadow: 0 1px 6px rgba(0,0,0,0.05); }
    .stat-card.income { border-left: 4px solid #00B894; }
    .stat-card.expense { border-left: 4px solid #FF6B6B; }
    .stat-label { font-size: 12px; color: #6C757D; font-weight: 600; margin-bottom: 6px; }
    .stat-amount { font-size: 15px; font-weight: 800; }
    .chart-card { background: #fff; border-radius: 16px; margin: 0 14px 14px; padding: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
    .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .chart-title { font-size: 16px; font-weight: 700; color: #2D3436; }
    .tab-row { display: flex; background: #F8F9FA; border-radius: 8px; padding: 2px; gap: 2px; }
    .s-tab { padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 600; color: #ADB5BD; cursor: pointer; }
    .s-tab.active-expense { background: #FF6B6B; color: #fff; }
    .s-tab.active-income { background: #00B894; color: #fff; }
    .bar-chart { display: flex; align-items: flex-end; overflow-x: auto; padding-bottom: 4px; min-height: 110px; gap: 2px; }
    .bar-chart::-webkit-scrollbar { display: none; }
    .bar-col { width: 22px; display: flex; flex-direction: column; align-items: center; flex-shrink: 0; }
    .bar-wrap { height: 90px; display: flex; align-items: flex-end; }
    .bar-visual { width: 14px; border-radius: 4px; }
    .bar-day { font-size: 9px; color: #ADB5BD; margin-top: 4px; }
    .cat-stat-row { margin-bottom: 16px; }
    .cat-stat-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .cat-stat-left { display: flex; align-items: center; gap: 8px; }
    .cat-stat-name { font-size: 14px; font-weight: 600; color: #2D3436; }
    .cat-stat-right { text-align: right; }
    .cat-stat-amount { font-size: 14px; font-weight: 700; color: #2D3436; }
    .cat-stat-pct { font-size: 11px; color: #6C757D; }
    .s-progress-bg { height: 8px; background: #F1F3F5; border-radius: 4px; overflow: hidden; }
    .s-progress-bar { height: 8px; border-radius: 4px; }

    /* ===== MODAL ===== */
    .modal-overlay {
      display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.6); z-index: 200; align-items: flex-end; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #fff; border-radius: 24px 24px 0 0;
      padding: 24px 20px 40px; width: 100%; max-width: 375px;
      max-height: 90vh; overflow-y: auto;
      animation: slideUp 0.3s ease;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .modal-handle { width: 40px; height: 4px; background: #E9ECEF; border-radius: 2px; margin: 0 auto 20px; }
    .modal-title { font-size: 18px; font-weight: 700; color: #2D3436; margin-bottom: 20px; text-align: center; }

    .type-toggle { display: flex; background: #F8F9FA; border-radius: 12px; padding: 4px; margin-bottom: 18px; }
    .type-btn {
      flex: 1; padding: 12px; border-radius: 8px; text-align: center;
      font-size: 15px; font-weight: 600; color: #ADB5BD; cursor: pointer;
      border: none; background: transparent; transition: all 0.2s;
    }
    .type-btn.expense-active { background: #FF6B6B; color: #fff; box-shadow: 0 2px 8px rgba(255,107,107,0.4); }
    .type-btn.income-active { background: #00B894; color: #fff; box-shadow: 0 2px 8px rgba(0,184,148,0.4); }

    .form-label { font-size: 12px; font-weight: 700; color: #6C757D; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    .form-group { margin-bottom: 16px; }
    .form-input {
      width: 100%; border: 1.5px solid #E9ECEF; border-radius: 10px;
      padding: 12px 14px; font-size: 16px; color: #2D3436;
      background: #fff; outline: none; transition: border-color 0.2s;
      -webkit-appearance: none;
    }
    .form-input:focus { border-color: #6C5CE7; }
    .amount-input { font-size: 24px; font-weight: 700; text-align: right; }

    .cat-grid { display: flex; flex-wrap: wrap; gap: 8px; }
    .cat-grid-item {
      width: calc(33.33% - 6px); display: flex; flex-direction: column; align-items: center;
      padding: 10px 6px; border-radius: 10px; border: 2px solid #E9ECEF;
      cursor: pointer; transition: all 0.15s;
    }
    .cat-grid-item.sel-expense { border-color: #FF6B6B; background: #FFF0F0; }
    .cat-grid-item.sel-income { border-color: #00B894; background: #F0FFF9; }
    .cat-icon-sm { font-size: 22px; margin-bottom: 5px; }
    .cat-name-sm { font-size: 11px; font-weight: 600; color: #6C757D; text-align: center; }

    .save-btn {
      width: 100%; padding: 16px; border-radius: 14px; border: none;
      font-size: 16px; font-weight: 700; color: #fff; cursor: pointer;
      margin-top: 8px; transition: opacity 0.2s;
    }
    .save-btn:active { opacity: 0.85; }
    .save-btn.expense { background: #FF6B6B; box-shadow: 0 4px 14px rgba(255,107,107,0.4); }
    .save-btn.income { background: #00B894; box-shadow: 0 4px 14px rgba(0,184,148,0.4); }
    .save-btn.budget-color { background: #6C5CE7; box-shadow: 0 4px 14px rgba(108,92,231,0.4); }

    .budget-cat-list { display: flex; flex-direction: column; gap: 8px; max-height: 280px; overflow-y: auto; }
    .budget-cat-item {
      display: flex; align-items: center; padding: 12px 14px;
      border: 2px solid #E9ECEF; border-radius: 12px; cursor: pointer; transition: all 0.15s;
    }
    .budget-cat-item.selected { border-color: #6C5CE7; background: #F0EEFF; }
    .budget-cat-item-icon { font-size: 22px; margin-right: 12px; }
    .budget-cat-item-name { font-size: 15px; font-weight: 600; color: #2D3436; flex: 1; }
    .budget-cat-item-current { font-size: 12px; color: #ADB5BD; }
    .delete-hint { font-size: 11px; color: #ADB5BD; text-align: center; margin-top: 4px; padding-bottom: 4px; }
  </style>
</head>
<body>
  <h1>💰 MoneyBook</h1>
  <div class="screen-tabs">
    <button class="screen-tab active" onclick="showScreen('home')">🏠 홈</button>
    <button class="screen-tab" onclick="showScreen('budget')">💰 예산</button>
    <button class="screen-tab" onclick="showScreen('stats')">📈 통계</button>
  </div>

  <div class="phone">
    <div class="status-bar">
      <span id="clockDisplay">9:41</span><span>●●●</span>
    </div>

    <!-- HOME -->
    <div class="screen active screen-content" id="home">
      <div class="month-nav">
        <span class="arrow" onclick="changeMonth(-1)">‹</span>
        <span class="month-text" id="homeMonthText"></span>
        <span class="arrow" onclick="changeMonth(1)">›</span>
      </div>
      <div class="summary-card">
        <div class="summary-row">
          <div class="summary-item">
            <div class="summary-label">수입</div>
            <div class="summary-amount" id="totalIncome" style="color:#00B894">0원</div>
          </div>
          <div class="summary-divider"></div>
          <div class="summary-item">
            <div class="summary-label">지출</div>
            <div class="summary-amount" id="totalExpense" style="color:#FF6B6B">0원</div>
          </div>
        </div>
        <div class="balance-row">
          <span class="balance-label">잔액</span>
          <span class="balance-amount" id="totalBalance">0원</span>
        </div>
      </div>
      <div class="section-title">거래 내역</div>
      <div class="delete-hint">거래 항목을 길게 누르면 삭제됩니다</div>
      <div id="transactionList"></div>
    </div>

    <!-- BUDGET -->
    <div class="screen screen-content" id="budget">
      <div class="header">예산 관리</div>
      <div id="budgetTotalCard"></div>
      <div class="budget-fab-wrap">
        <button class="budget-fab" onclick="openBudgetModal()">
          <span style="font-size:20px">＋</span> 예산 설정하기
        </button>
      </div>
      <div class="section-title">카테고리별 예산</div>
      <div id="budgetList"></div>
    </div>

    <!-- STATS -->
    <div class="screen screen-content" id="stats">
      <div class="month-nav">
        <span class="arrow" onclick="changeMonth(-1)">‹</span>
        <span class="month-text" id="statsMonthText"></span>
        <span class="arrow" onclick="changeMonth(1)">›</span>
      </div>
      <div class="stats-summary">
        <div class="stat-card income">
          <div class="stat-label">총 수입</div>
          <div class="stat-amount" id="statsIncome" style="color:#00B894">0원</div>
        </div>
        <div class="stat-card expense">
          <div class="stat-label">총 지출</div>
          <div class="stat-amount" id="statsExpense" style="color:#FF6B6B">0원</div>
        </div>
      </div>
      <div class="chart-card">
        <div class="chart-header">
          <div class="chart-title">일별 현황</div>
          <div class="tab-row">
            <div class="s-tab active-expense" id="tabExpense" onclick="setStatsTab('expense')">지출</div>
            <div class="s-tab" id="tabIncome" onclick="setStatsTab('income')">수입</div>
          </div>
        </div>
        <div class="bar-chart" id="barChart"></div>
      </div>
      <div class="chart-card">
        <div class="chart-title" style="margin-bottom:16px">카테고리별 지출</div>
        <div id="catStatList"></div>
      </div>
    </div>

    <!-- Home FAB (inside phone so it stays positioned correctly) -->
    <button class="fab" id="homeFab" onclick="openTransactionModal()" style="position:absolute;bottom:24px;right:20px">+</button>
  </div>

  <!-- TRANSACTION MODAL -->
  <div class="modal-overlay" id="transactionModal" onclick="closeModalOnOverlay(event,'transactionModal')">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-title">거래 추가</div>
      <div class="type-toggle">
        <button class="type-btn expense-active" id="btnExpense" onclick="setType('expense')">지출</button>
        <button class="type-btn" id="btnIncome" onclick="setType('income')">수입</button>
      </div>
      <div class="form-group">
        <div class="form-label">금액 (원)</div>
        <input class="form-input amount-input" type="number" id="inputAmount" placeholder="0" inputmode="numeric">
      </div>
      <div class="form-group">
        <div class="form-label">날짜</div>
        <input class="form-input" type="date" id="inputDate">
      </div>
      <div class="form-group">
        <div class="form-label">카테고리</div>
        <div class="cat-grid" id="catGrid"></div>
      </div>
      <div class="form-group">
        <div class="form-label">메모 (선택)</div>
        <input class="form-input" type="text" id="inputMemo" placeholder="메모를 입력하세요">
      </div>
      <button class="save-btn expense" id="saveTransactionBtn" onclick="saveTransaction()">저장하기</button>
    </div>
  </div>

  <!-- BUDGET MODAL -->
  <div class="modal-overlay" id="budgetModal" onclick="closeModalOnOverlay(event,'budgetModal')">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-title">예산 설정</div>
      <div class="form-group">
        <div class="form-label">카테고리 선택</div>
        <div class="budget-cat-list" id="budgetCatList"></div>
      </div>
      <div class="form-group" style="margin-top:12px">
        <div class="form-label">예산 금액 (원)</div>
        <input class="form-input amount-input" type="number" id="inputBudgetAmount" placeholder="0" inputmode="numeric">
      </div>
      <button class="save-btn budget-color" onclick="saveBudget()">예산 저장</button>
    </div>
  </div>

  <script>
  // ===== DB (localStorage) =====
  const DB = {
    getTransactions() {
      try { return JSON.parse(localStorage.getItem('mb_transactions') || '[]'); }
      catch(e) { return []; }
    },
    saveTransactions(arr) {
      localStorage.setItem('mb_transactions', JSON.stringify(arr));
    },
    addTransaction(t) {
      const arr = this.getTransactions();
      arr.unshift(t);
      this.saveTransactions(arr);
    },
    deleteTransaction(id) {
      this.saveTransactions(this.getTransactions().filter(t => t.id !== id));
    },
    getBudgets() {
      try { return JSON.parse(localStorage.getItem('mb_budgets') || '{}'); }
      catch(e) { return {}; }
    },
    saveBudgetEntry(categoryId, amount) {
      const b = this.getBudgets();
      b[categoryId] = amount;
      localStorage.setItem('mb_budgets', JSON.stringify(b));
    }
  };

  // ===== CATEGORIES =====
  const EXPENSE_CATS = [
    { id: 'food', name: '식비', icon: '🍚', color: '#FF6B6B' },
    { id: 'transport', name: '교통', icon: '🚌', color: '#4ECDC4' },
    { id: 'shopping', name: '쇼핑', icon: '🛍️', color: '#45B7D1' },
    { id: 'entertainment', name: '여가', icon: '🎮', color: '#96CEB4' },
    { id: 'health', name: '의료', icon: '💊', color: '#FDCB6E' },
    { id: 'education', name: '교육', icon: '📚', color: '#DDA0DD' },
    { id: 'housing', name: '주거', icon: '🏠', color: '#F0A500' },
    { id: 'communication', name: '통신', icon: '📱', color: '#74B9FF' },
    { id: 'beauty', name: '미용', icon: '💄', color: '#FD79A8' },
    { id: 'other_expense', name: '기타', icon: '💸', color: '#B2BEC3' },
  ];
  const INCOME_CATS = [
    { id: 'salary', name: '급여', icon: '💰', color: '#00B894' },
    { id: 'freelance', name: '부업', icon: '💻', color: '#6C5CE7' },
    { id: 'investment', name: '투자', icon: '📈', color: '#FDCB6E' },
    { id: 'gift', name: '용돈', icon: '🎁', color: '#E17055' },
    { id: 'other_income', name: '기타수입', icon: '💵', color: '#B2BEC3' },
  ];
  const ALL_CATS = [...INCOME_CATS, ...EXPENSE_CATS];
  function getCat(id) {
    return ALL_CATS.find(c => c.id === id) || { name: '기타', icon: '💸', color: '#B2BEC3' };
  }
  function fmt(n) { return Number(n).toLocaleString('ko-KR') + '원'; }
  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

  // ===== STATE =====
  let currentYear = new Date().getFullYear();
  let currentMonth = new Date().getMonth() + 1;
  let currentType = 'expense';
  let selectedCatId = null;
  let statsTab = 'expense';
  let selectedBudgetCatId = null;

  // Clock
  function updateClock() {
    const now = new Date();
    document.getElementById('clockDisplay').textContent =
      now.getHours() + ':' + String(now.getMinutes()).padStart(2,'0');
  }
  updateClock(); setInterval(updateClock, 30000);

  // ===== SCREEN =====
  function showScreen(name) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.screen-tab').forEach(t => t.classList.remove('active'));
    document.getElementById(name).classList.add('active');
    const tabs = ['home','budget','stats'];
    document.querySelectorAll('.screen-tab')[tabs.indexOf(name)].classList.add('active');
    document.getElementById('homeFab').style.display = name === 'home' ? 'flex' : 'none';
    renderAll();
  }

  function changeMonth(dir) {
    currentMonth += dir;
    if (currentMonth > 12) { currentMonth = 1; currentYear++; }
    if (currentMonth < 1) { currentMonth = 12; currentYear--; }
    renderAll();
  }

  // ===== RENDER =====
  function getMonthTransactions() {
    return DB.getTransactions().filter(t => {
      const d = new Date(t.date);
      return d.getFullYear() === currentYear && d.getMonth() + 1 === currentMonth;
    });
  }

  function renderAll() {
    const label = currentYear + '년 ' + currentMonth + '월';
    document.getElementById('homeMonthText').textContent = label;
    document.getElementById('statsMonthText').textContent = label;
    const txs = getMonthTransactions();
    renderHome(txs);
    renderBudget(txs);
    renderStats(txs);
  }

  function renderHome(txs) {
    let income = 0, expense = 0;
    txs.forEach(t => t.type === 'income' ? (income += t.amount) : (expense += t.amount));
    const bal = income - expense;

    document.getElementById('totalIncome').textContent = fmt(income);
    document.getElementById('totalExpense').textContent = fmt(expense);
    const balEl = document.getElementById('totalBalance');
    balEl.textContent = (bal >= 0 ? '+' : '') + fmt(bal);
    balEl.style.color = bal >= 0 ? '#2D3436' : '#FF6B6B';

    const list = document.getElementById('transactionList');
    if (txs.length === 0) {
      list.innerHTML = `<div class="empty-state">
        <div class="empty-icon">📋</div>
        <div class="empty-text">이번 달 거래가 없습니다</div>
        <div class="empty-sub">+ 버튼으로 추가해보세요!</div>
      </div>`;
      return;
    }
    list.innerHTML = txs.map(t => {
      const cat = getCat(t.category);
      const isIncome = t.type === 'income';
      const d = new Date(t.date);
      const ds = (d.getMonth()+1) + '/' + d.getDate();
      return `<div class="transaction-item" ontouchstart="" oncontextmenu="deleteT('${t.id}');return false;" ondblclick="deleteT('${t.id}')">
        <div class="cat-icon" style="background:${cat.color}22">${cat.icon}</div>
        <div class="t-info">
          <div class="t-title">${t.memo || cat.name}</div>
          <div class="t-sub">${cat.name} · ${ds}</div>
        </div>
        <div class="t-amount" style="color:${isIncome?'#00B894':'#FF6B6B'}">
          ${isIncome?'+':'-'}${fmt(t.amount)}
        </div>
      </div>`;
    }).join('');

    // Long press to delete on mobile
    setTimeout(() => {
      document.querySelectorAll('.transaction-item').forEach((el, i) => {
        let timer;
        el.addEventListener('touchstart', () => {
          timer = setTimeout(() => {
            const id = txs[i]?.id;
            if (id) deleteT(id);
          }, 600);
        });
        el.addEventListener('touchend', () => clearTimeout(timer));
        el.addEventListener('touchmove', () => clearTimeout(timer));
      });
    }, 0);
  }

  function deleteT(id) {
    if (confirm('이 거래를 삭제할까요?')) {
      DB.deleteTransaction(id);
      renderAll();
    }
  }

  function renderBudget(txs) {
    const budgets = DB.getBudgets();
    const spent = {};
    txs.filter(t => t.type === 'expense').forEach(t => {
      spent[t.category] = (spent[t.category] || 0) + t.amount;
    });

    const totalBudget = Object.values(budgets).reduce((s,v) => s+(v||0), 0);
    const totalSpent = Object.values(spent).reduce((s,v) => s+v, 0);
    const remaining = totalBudget - totalSpent;
    const pct = totalBudget > 0 ? Math.min(Math.round((totalSpent/totalBudget)*100), 100) : 0;

    const totalCard = document.getElementById('budgetTotalCard');
    totalCard.innerHTML = totalBudget > 0 ? `<div class="total-budget-card">
      <div class="tb-title">${currentMonth}월 전체 예산</div>
      <div class="tb-amount">${fmt(totalBudget)}</div>
      <div class="tb-row">
        <div class="tb-item">
          <div class="tb-item-label">사용</div>
          <div class="tb-item-value" style="color:#FFB3B3">${fmt(totalSpent)}</div>
        </div>
        <div class="tb-item">
          <div class="tb-item-label">남은 예산</div>
          <div class="tb-item-value" style="color:${remaining>=0?'#A8F0E0':'#FFB3B3'}">${fmt(Math.abs(remaining))}</div>
        </div>
      </div>
      <div class="progress-bg"><div class="progress-bar" style="width:${pct}%;background:#fff"></div></div>
      <div class="progress-text">${pct}% 사용</div>
    </div>` : '';

    const withBudget = EXPENSE_CATS.filter(c => budgets[c.id]);
    const withoutBudget = EXPENSE_CATS.filter(c => !budgets[c.id]);

    document.getElementById('budgetList').innerHTML = [...withBudget, ...withoutBudget].map(cat => {
      const budget = budgets[cat.id] || 0;
      const s = spent[cat.id] || 0;
      const rem = budget - s;
      const isOver = s > budget && budget > 0;
      const bpct = budget > 0 ? Math.min((s/budget)*100, 100) : 0;
      return `<div class="budget-card">
        <div class="budget-header">
          <div class="budget-left">
            <div class="b-icon" style="background:${cat.color}22">${cat.icon}</div>
            <div class="b-name">${cat.name}</div>
          </div>
          ${budget > 0
            ? `<div class="b-amount-tag">${fmt(budget)}</div>`
            : `<div class="b-not-set">미설정</div>`}
        </div>
        ${budget > 0 ? `
          <div class="spent-row">
            <div class="spent-label">사용: <strong style="color:#FF6B6B">${fmt(s)}</strong></div>
            <div class="remain-label" style="color:${isOver?'#FF6B6B':'#00B894'}">
              ${isOver ? '초과: '+fmt(s-budget) : '남음: '+fmt(rem)}
            </div>
          </div>
          <div class="b-progress-bg">
            <div class="b-progress-bar" style="width:${bpct}%;background:${isOver?'#FF6B6B':cat.color}"></div>
          </div>
          ${isOver ? '<div class="over-budget-text">⚠️ 예산 초과!</div>' : ''}
        ` : ''}
      </div>`;
    }).join('');
  }

  function renderStats(txs) {
    let income = 0, expense = 0;
    txs.forEach(t => t.type === 'income' ? (income += t.amount) : (expense += t.amount));
    document.getElementById('statsIncome').textContent = fmt(income);
    document.getElementById('statsExpense').textContent = fmt(expense);

    // Bar chart
    const daily = {};
    txs.filter(t => t.type === statsTab).forEach(t => {
      const day = new Date(t.date).getDate();
      daily[day] = (daily[day] || 0) + t.amount;
    });
    const maxVal = Math.max(...Object.values(daily), 1);
    const daysInMonth = new Date(currentYear, currentMonth, 0).getDate();
    const barChart = document.getElementById('barChart');
    barChart.innerHTML = '';
    for (let d = 1; d <= daysInMonth; d++) {
      const amt = daily[d] || 0;
      const h = amt > 0 ? Math.max((amt/maxVal)*80, 6) : 2;
      const col = document.createElement('div');
      col.className = 'bar-col';
      col.innerHTML = `<div class="bar-wrap"><div class="bar-visual" style="height:${h}px;background:${amt>0?(statsTab==='expense'?'#FF6B6B':'#00B894'):'#E9ECEF'}"></div></div><div class="bar-day">${d}</div>`;
      barChart.appendChild(col);
    }

    // Category breakdown
    const catTotals = {};
    txs.filter(t => t.type === 'expense').forEach(t => {
      catTotals[t.category] = (catTotals[t.category] || 0) + t.amount;
    });
    const sorted = Object.entries(catTotals).sort((a,b) => b[1]-a[1]);
    const maxAmt = sorted.length > 0 ? sorted[0][1] : 1;
    const catList = document.getElementById('catStatList');
    if (sorted.length === 0) {
      catList.innerHTML = '<div style="text-align:center;color:#ADB5BD;font-size:14px;padding:20px 0">이번 달 지출 내역이 없습니다</div>';
      return;
    }
    catList.innerHTML = sorted.map(([catId, amt]) => {
      const cat = getCat(catId);
      const pct = expense > 0 ? Math.round((amt/expense)*100) : 0;
      const barW = Math.round((amt/maxAmt)*100);
      return `<div class="cat-stat-row">
        <div class="cat-stat-header">
          <div class="cat-stat-left">
            <span style="font-size:18px">${cat.icon}</span>
            <span class="cat-stat-name">${cat.name}</span>
          </div>
          <div class="cat-stat-right">
            <div class="cat-stat-amount">${fmt(amt)}</div>
            <div class="cat-stat-pct">${pct}%</div>
          </div>
        </div>
        <div class="s-progress-bg"><div class="s-progress-bar" style="width:${barW}%;background:${cat.color}"></div></div>
      </div>`;
    }).join('');
  }

  function setStatsTab(tab) {
    statsTab = tab;
    document.getElementById('tabExpense').className = 's-tab' + (tab === 'expense' ? ' active-expense' : '');
    document.getElementById('tabIncome').className = 's-tab' + (tab === 'income' ? ' active-income' : '');
    renderStats(getMonthTransactions());
  }

  // ===== TRANSACTION MODAL =====
  function openTransactionModal() {
    selectedCatId = null;
    document.getElementById('inputAmount').value = '';
    document.getElementById('inputMemo').value = '';
    document.getElementById('inputDate').value = new Date().toISOString().split('T')[0];
    setType('expense');
    document.getElementById('transactionModal').classList.add('open');
  }

  function setType(type) {
    currentType = type;
    document.getElementById('btnExpense').className = 'type-btn' + (type === 'expense' ? ' expense-active' : '');
    document.getElementById('btnIncome').className = 'type-btn' + (type === 'income' ? ' income-active' : '');
    document.getElementById('saveTransactionBtn').className = 'save-btn ' + type;
    selectedCatId = null;
    renderCatGrid();
  }

  function renderCatGrid() {
    const cats = currentType === 'expense' ? EXPENSE_CATS : INCOME_CATS;
    document.getElementById('catGrid').innerHTML = cats.map(cat => {
      const sel = selectedCatId === cat.id;
      return `<div class="cat-grid-item ${sel ? 'sel-'+currentType : ''}" onclick="selectCat('${cat.id}')">
        <div class="cat-icon-sm">${cat.icon}</div>
        <div class="cat-name-sm">${cat.name}</div>
      </div>`;
    }).join('');
  }

  function selectCat(id) {
    selectedCatId = id;
    renderCatGrid();
  }

  function saveTransaction() {
    const amount = Number(document.getElementById('inputAmount').value);
    const date = document.getElementById('inputDate').value;
    const memo = document.getElementById('inputMemo').value.trim();
    if (!amount || amount <= 0) { alert('금액을 입력해주세요'); return; }
    if (!date) { alert('날짜를 선택해주세요'); return; }
    if (!selectedCatId) { alert('카테고리를 선택해주세요'); return; }
    DB.addTransaction({ id: uid(), type: currentType, amount, date, category: selectedCatId, memo });
    document.getElementById('transactionModal').classList.remove('open');
    renderAll();
  }

  // ===== BUDGET MODAL =====
  function openBudgetModal() {
    selectedBudgetCatId = null;
    document.getElementById('inputBudgetAmount').value = '';
    const budgets = DB.getBudgets();
    document.getElementById('budgetCatList').innerHTML = EXPENSE_CATS.map(cat => {
      const cur = budgets[cat.id];
      return `<div class="budget-cat-item" id="bcat_${cat.id}" onclick="selectBudgetCat('${cat.id}')">
        <span class="budget-cat-item-icon">${cat.icon}</span>
        <span class="budget-cat-item-name">${cat.name}</span>
        <span class="budget-cat-item-current">${cur ? fmt(cur) : '미설정'}</span>
      </div>`;
    }).join('');
    document.getElementById('budgetModal').classList.add('open');
  }

  function selectBudgetCat(id) {
    selectedBudgetCatId = id;
    document.querySelectorAll('.budget-cat-item').forEach(el => el.classList.remove('selected'));
    const el = document.getElementById('bcat_' + id);
    if (el) el.classList.add('selected');
    const budgets = DB.getBudgets();
    if (budgets[id]) document.getElementById('inputBudgetAmount').value = budgets[id];
    else document.getElementById('inputBudgetAmount').value = '';
  }

  function saveBudget() {
    if (!selectedBudgetCatId) { alert('카테고리를 선택해주세요'); return; }
    const amount = Number(document.getElementById('inputBudgetAmount').value);
    if (!amount || amount <= 0) { alert('예산 금액을 입력해주세요'); return; }
    DB.saveBudgetEntry(selectedBudgetCatId, amount);
    document.getElementById('budgetModal').classList.remove('open');
    renderAll();
  }

  function closeModalOnOverlay(e, id) {
    if (e.target === document.getElementById(id)) {
      document.getElementById(id).classList.remove('open');
    }
  }

  // ===== INIT =====
  renderAll();
  renderCatGrid();
  </script>
</body>
</html>
